[General]
network = test2.LoRaNetworkTest

**.loRaNode.LoRaNic.radio.energyConsumer.typename = "LoRaEnergyConsumer"
**.loRaNode.**.energySourceModule = "^.IdealEpEnergyStorage"
**.loRaNode.LoRaNic.radio.energyConsumer.configFile = xmldoc("/home/kayra/Desktop/omnetpp-6.0.3/samples/test2/simulations/energyConsumptionParam.xml")

**.maxTransmissionDuration = 4s
**.energyDetection = -110dBm

#cmdenv-autoflush = true
#cmdenv-status-frequency = 10000000s
#cmdenv-express-mode = false
#cmdenv-output-file = cmd_env_log.txt
**.vector-recording = true

rng-class = "cMersenneTwister"
**.loRaGateway.numUdpApps = 1
**.loRaGateway.packetForwarder.localPort = 2000
**.loRaGateway.packetForwarder.destPort = 1000
**.loRaGateway.packetForwarder.destAddresses = "HospitalServer"
#**.loRaGateway.packetForwarder.indexNumber = 0

**.HospitalServer.numApps = 1
**.HospitalServer.**.evaluateADRinServer = true
**.HospitalServer.app[0].typename = "HospitalServerApp"
#**.HospitalServer.app[0].destAddresses = "loRaGateway"
**.HospitalServer.app[0].destPort = 2000
**.HospitalServer.app[0].localPort = 1000
**.HospitalServer.app[0].adrMethod = ${"avg"}

**.numberOfPacketsToSend = 0 #${numberOfPAckets = 200..5000 step 200} #100 #obviously 0 means infinite number of packets
sim-time-limit = 1d
simtime-resolution = -11
repeat = 5

**.timeToFirstPacket = 30s
**.timeToNextPacket = uniform(1s,10s)#PACKET INTER ARRIVAL TIME

#nodes features
**.loRaNode.**.initialX = 300m
**.loRaNode.**.initialY = 350m
**.loRaNode.**initialLoRaSF = 12
**.loRaNode.**initialLoRaTP = 14dBm
**.loRaNode.**initialLoRaBW = 125 kHz
**.loRaNode.**initialLoRaCR = 4
**.loRaNode.**.initFromDisplayString = false
**.loRaNode.**.evaluateADRinNode = true
**.loRaNode.numApps = 1
**.loRaNode.app[0].typename = "PatientSensorApp"


**.loRaGateway.**.initFromDisplayString = false

#general features
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

**.radio.radioMediumModule = "LoRaMedium"
#**.LoRaMedium.pathLossType = "LoRaPathLossOulu"
**.minInterferenceTime = 0s


**.constraintAreaMaxX = 2376.0m
**.constraintAreaMaxY = 1090.0m
**.loRaGateway.**.initialX = 544.00m
**.loRaGateway.**.initialY = 544.00m



